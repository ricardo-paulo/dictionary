<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicionário Boladão</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app-container">

        <header class="topbar">
            <div class="container-fluid px-0">
                <div class="d-flex justify-content-between align-items-center flex-wrap gap-3">
                    <div class="logo-area d-flex align-items-center gap-3">
                        <i class="fa-solid fa-dragon logo-icon"></i>
                        <h1 class="mb-0">DICIONÁRIO BOLADÃO</h1>
                    </div>

                    <div class="search-bar d-flex align-items-center gap-2">
                        <input type="text" placeholder="BUSCAR NO DICIONÁRIO">
                        <i class="fa-solid fa-magnifying-glass search-icon"></i>
                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="row g-4">

                <div class="col-12 col-lg-8">

                    <div class="d-flex flex-wrap gap-2 mb-4">
                        <button class="filter-btn active">Em Ordem</button>
                        <button class="filter-btn inactive">Pré-ordem</button>
                        <button class="filter-btn inactive">Pós-ordem</button>
                    </div>

                    <div class="words-list d-flex flex-column gap-3" id="words-list"></div>

                </div>

                <div class="col-12 col-lg-4">

                    <!-- ? Tranformar isso em Palavra Aleatória? -->
                    <div class="word-of-day-card">

                        <h2>PALAVRA DO DIA</h2>
                        <div class="daily-word">Dragon</div>

                    </div>

                </div>

            </div>
        </main>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js" defer></script>
    <script type="module" src="src/main.js" defer></script>
    <script type="module" src="custom/DefinitionCard.js" defer></script>
</body>

</html>
