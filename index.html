<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dicionário Boladão</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <link rel="shortcut icon" href="dragon-icon.svg" type="image/x-icon">
</head>

<body>

    <div class="app-container">
        
        <!--* Modal de Criação e Atualização de Termo -->
        <div class="modal fade" id="editModal" tabindex="-1" aria-labelledby="editModalLabel" aria-hidden="true">
            <div class="modal-dialog modal-dialog-centered" data-bs-theme="dark">
                <div class="modal-content bg-dark">
                    
                    <div class="modal-header text-white border-0">
                        <h1 class="modal-title fs-5" id="editModalLabel">Editar Definição</h1>
                        <button type="button" class="btn-close cancel-op" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>

                    <div class="modal-body">
                        <div class="form-floating mb-3 text-white-50 focus-ring">
                            <input type="text" class="form-control focus-ring focus-ring-danger border" id="portuguese-input" placeholder="Português">
                            <label for="portuguese-input">Português</label>
                        </div>

                        <div class="form-floating mb-3 text-white-50">
                            <input type="text" class="form-control focus-ring focus-ring-danger border" id="high_valyrian-input" placeholder="Alto Valiriano">
                            <label for="high_valyrian-input">Alto Valiriano</label>
                        </div>

                        <div class="form-floating mb-3 text-white-50">
                            <input type="text" class="form-control focus-ring focus-ring-danger border" id="classification-input" placeholder="Classificação">
                            <label for="classification-input">Classificação</label>
                        </div>

                        <div class="form-floating mb-3 text-white-50">
                            <input type="text" class="form-control focus-ring focus-ring-danger border" id="verbal_time-input" placeholder="Tempo Verbal">
                            <label for="verbal_time-input">Tempo Verbal</label>
                        </div>

                        <div class="form-floating mb-3 text-white-50">
                            <input type="text" class="form-control focus-ring focus-ring-danger border" id="gender-input" placeholder="Gênero">
                            <label for="gender-input">Gênero</label>
                        </div>
                    </div>

                    <div class="modal-footer border-0">
                        <button 
                        type="button"
                        class="standard-button inactive cancel-op" data-bs-dismiss="modal">Cancelar</button>
                        <button 
                        type="button" id="save-button" class="standard-button active" data-bs-dismiss="modal">Salvar</button>
                    </div>

                </div>
            </div>
        </div>

        <!--* Modal de Deleção de Termo -->
        <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
            <div class="modal-dialog" data-bs-theme="dark">
                <div class="modal-content bg-dark text-white">
                    
                    <div class="modal-header border-0">
                        <h1 class="modal-title fs-5" id="deleteModalLabel">Confirme se deseja deletar essa definição:</h1>
                        <button type="button" class="btn-close cancel-op" data-bs-dismiss="modal" aria-label="Close"></button>
                    </div>
                    
                    <div class="modal-body"></div>

                    <div class="modal-footer border-0">
                        <button type="button" class="standard-button inactive cancel-op" data-bs-dismiss="modal">Cancelar</button>
                        <button type="button" class="standard-button active" data-bs-dismiss="modal" id="delete-button">Deletar</button>
                    </div>

                </div>
            </div>
        </div>

        <!--* Página visível -->
        <header class="topbar">
            <div class="container-fluid px-0">
                <div class="row">
                    <div class="col-12 col-md-7 logo-area d-flex align-items-center gap-3">
                        <i class="fa-solid fa-dragon logo-icon"></i>
                        <h1 class="mb-0">DICIONÁRIO BOLADÃO</h1>
                    </div>

                    <div class="col input-group input-group-sm mx-0 mx-md-5 mt-2 mt-md-0">

                        <select class="form-select rounded-start-pill w-25 pe-4 focus-ring focus-ring-dark" id="language-select">
                            <option value="portuguese" aria-label="Português" selected>Português</option>
                            <option value="high_valyrian" aria-label="Alto Valiriano">Alto Valiriano</option>
                        </select>

                        <input 
                        type="text" 
                        id="search-bar"
                        class="form-control rounded-end-pill w-50 focus-ring focus-ring-dark"
                        placeholder="Buscar palavra">

                    </div>
                </div>
            </div>
        </header>

        <main class="main-content">
            <div class="row g-4">

                <div class="col-12 col-lg-8">

                    <div class="row">
                        <div class="d-flex flex-wrap gap-2 mb-4 col-10" id="filter-buttons">
                            <button class="standard-button active focus-ring focus-ring-danger" name="inorder" id="inorder-button">Em Ordem</button>
                            <button class="standard-button inactive" name="preorder" id="preorder-button">Pré-ordem</button>
                            <button class="standard-button inactive" name="postorder" id="postorder-button">Pós-ordem</button>
                        </div>

                        <div class="d-flex flex-column col-2">
                            <button class="standard-button" id="create-button" data-bs-toggle="modal" data-bs-target="#editModal">
                                <i class="fa-solid fa-plus"></i>
                            </button>
                        </div>
                    </div>

                    <div class="words-list d-flex flex-column gap-3" id="words-list"></div>

                </div>

                <div class="col-12 col-lg-4">

                    <aside class="word-of-day-card">

                        <h2>PALAVRA ALEATÓRIA</h2>
                        <div id="random-definition"></div>

                    </aside>

                    <aside class="info-div p-3  my-3 rounded-2">

                        <h2 class="m-0">Profundidade: <span id="breadth-span"></span></h2>
                        
                    </aside>

                    <aside class="info-div p-3  my-3 rounded-2">

                        <h2 class="m-0">Altura: <span id="height-span"></span></h2>
                        
                    </aside>

                </div>

            </div>
        </main>

    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/js/bootstrap.bundle.min.js" defer></script>
    <script type="module" src="custom/DefinitionCard.js" defer></script>
    <script type="module" src="src/main.js" defer></script>

</body>

</html>
